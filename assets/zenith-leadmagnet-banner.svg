<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" role="img" aria-label="Zenith Lead Magnet Master banner">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0B0B17"/>
    </linearGradient>
    <linearGradient id="zgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5CF"/>
      <stop offset="100%" stop-color="#B845FF"/>
    </linearGradient>
    <linearGradient id="zgrad-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5CF"/>
      <stop offset="100%" stop-color="#B845FF"/>
    </linearGradient>
    <linearGradient id="magnet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9bf6ec"/>
      <stop offset="45%" stop-color="#00E5CF"/>
      <stop offset="100%" stop-color="#B845FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5CF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#00E5CF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-p" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B845FF" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#B845FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1280" height="400" fill="url(#bg-grad)"/>

  <!-- Glows -->
  <circle cx="245" cy="205" r="250" fill="url(#glow)"/>
  <circle cx="1080" cy="120" r="240" fill="url(#glow-p)"/>

  <!-- Cuadrícula sutil -->
  <g opacity="0.06" stroke="#00E5CF" stroke-width="1">
    <line x1="0" y1="100" x2="1280" y2="100"/>
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="300" x2="1280" y2="300"/>
  </g>

  <!-- ============ IMÁN DE HERRADURA + LEADS ATRAÍDOS ============ -->
  <g>
    <!-- Leads (partículas) siendo atraídas hacia los polos -->
    <g fill="url(#zgrad-h)">
      <circle cx="120" cy="70"  r="9"  opacity="0.95"/>
      <circle cx="195" cy="52"  r="7"  opacity="0.85"/>
      <circle cx="300" cy="60"  r="8"  opacity="0.90"/>
      <circle cx="372" cy="84"  r="6"  opacity="0.75"/>
      <circle cx="78"  cy="120" r="6"  opacity="0.70"/>
      <circle cx="360" cy="150" r="5"  opacity="0.60"/>
      <circle cx="150" cy="40"  r="4"  opacity="0.55"/>
      <circle cx="255" cy="38"  r="5"  opacity="0.65"/>
    </g>
    <!-- Estelas de movimiento (atracción) -->
    <g stroke="url(#zgrad-h)" stroke-width="3" stroke-linecap="round" opacity="0.45" fill="none">
      <path d="M120 84 q40 25 65 40"/>
      <path d="M300 76 q-30 25 -55 45"/>
      <path d="M195 64 q15 20 18 38"/>
      <path d="M372 96 q-40 20 -75 38"/>
    </g>

    <!-- Cuerpo del imán de herradura (polos arriba) -->
    <path d="M180 150 L180 250 A45 45 0 0 1 270 250 L270 150"
          fill="none" stroke="url(#magnet)" stroke-width="46" stroke-linecap="butt"/>
    <!-- Brillo del metal -->
    <path d="M180 150 L180 250 A45 45 0 0 1 270 250 L270 150"
          fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="butt" opacity="0.18"/>

    <!-- Polos (puntas de color) -->
    <rect x="157" y="138" width="46" height="22" rx="4" fill="#00E5CF"/>
    <rect x="247" y="138" width="46" height="22" rx="4" fill="#B845FF"/>
    <text x="180" y="132" font-family="ui-monospace,'SF Mono',monospace" font-size="15" font-weight="700" fill="#00E5CF" text-anchor="middle">N</text>
    <text x="270" y="132" font-family="ui-monospace,'SF Mono',monospace" font-size="15" font-weight="700" fill="#B845FF" text-anchor="middle">S</text>
  </g>

  <!-- ============ TEXTO ============ -->
  <!-- Eyebrow -->
  <text x="470" y="120" font-family="ui-monospace,'SF Mono',monospace" font-size="20" letter-spacing="6" fill="#777788">ZENITH · MÉTODO</text>

  <!-- Título -->
  <text x="468" y="196" font-family="Georgia,'Times New Roman',serif" font-size="74" font-weight="700" fill="#ffffff">Lead Magnet</text>
  <text x="468" y="272" font-family="Georgia,'Times New Roman',serif" font-size="74" font-weight="700" fill="url(#zgrad-h)">Master</text>

  <!-- Tagline -->
  <text x="470" y="312" font-family="ui-monospace,'SF Mono',monospace" font-size="19" fill="#c5c5d4">Lead magnets épicos, interactivos y gamificados — no PDFs</text>

  <!-- Chips -->
  <g font-family="ui-monospace,'SF Mono',monospace" font-size="15" fill="#c5c5d4">
    <rect x="470" y="332" width="180" height="34" rx="17" fill="none" stroke="#00E5CF" stroke-opacity="0.5"/>
    <text x="560" y="354" text-anchor="middle">cero emojis · todo SVG</text>
    <rect x="662" y="332" width="168" height="34" rx="17" fill="none" stroke="#B845FF" stroke-opacity="0.5"/>
    <text x="746" y="354" text-anchor="middle">español de España</text>
    <rect x="842" y="332" width="120" height="34" rx="17" fill="none" stroke="#777788" stroke-opacity="0.7"/>
    <text x="902" y="354" text-anchor="middle">Opus 4.x</text>
    <rect x="974" y="332" width="190" height="34" rx="17" fill="none" stroke="#00E5CF" stroke-opacity="0.5"/>
    <text x="1069" y="354" text-anchor="middle">microtransformación jugable</text>
  </g>
</svg>
